<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USOT — United States Oil Token</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #111827, #020617);
    color: #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  .container {
    max-width: 720px;
    padding: 30px;
    text-align: center;
    backdrop-filter: blur(12px);
  }

  .logo-wrap {
    margin-bottom: 25px;
  }

  .logo-circle {
    width: 90px;
    height: 90px;
    margin: 0 auto 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, #facc15, #f97316);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 28px;
    color: #000;
    box-shadow: 0 0 30px rgba(250,204,21,0.4);
  }

  .logo-text {
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 2px;
    color: #facc15;
  }

  p {
    line-height: 1.6;
    opacity: 0.85;
    margin-bottom: 18px;
  }

  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(250,204,21,0.15), transparent 70%);
    top: -100px;
    right: -100px;
    filter: blur(60px);
  }

  .grid {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: -1;
  }
</style>
</head>
<body>

<div class="grid"></div>
<div class="glow"></div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo-circle">US</div>
    <div class="logo-text">USOT</div>
  </div>

  <b>Almost There</b>
</div>

</body>
</html>
